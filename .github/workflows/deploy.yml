name: Deploy SYNK-IA to Oracle VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare remote directories
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "sudo mkdir -p /var/www/sinkialabs /opt/sinkia-backend && sudo chown ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /var/www/sinkialabs /opt/sinkia-backend"

      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/sinkialabs/

      - name: Deploy backend
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            server/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/opt/sinkia-backend/

      - name: Create .env and start backend
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'ENDSSH'
          cat > /opt/sinkia-backend/.env << 'EOF'
          PORT=3001
          EMAIL_USER=info@chickenpalace.es
          EMAIL_APP_PASSWORD=${{ secrets.EMAIL_APP_PASSWORD }}
          ASSEMPSA_BILOOP_API_KEY=${{ secrets.ASSEMPSA_BILOOP_API_KEY }}
          BILOOP_USER=${{ secrets.BILOOP_USER }}
          BILOOP_PASSWORD=${{ secrets.BILOOP_PASSWORD }}
          BILOOP_CIF=${{ secrets.BILOOP_CIF }}
          REVO_TOKEN_LARGO=${{ secrets.REVO_BEARER_TOKEN }}
          REVO_ADMIN_USER=${{ secrets.REVO_TENANT }}
          EOF
          cd /opt/sinkia-backend
          npm install --production
          which pm2 || sudo npm install -g pm2
          pm2 delete sinkia-api 2>/dev/null || true
          pm2 start index.js --name sinkia-api
          pm2 save
          ENDSSH

      - name: Configure Nginx with SSL
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'ENDSSH'
          # Disable Tailscale funnel/serve to free port 443
          sudo tailscale funnel off 2>/dev/null || true
          sudo tailscale serve reset 2>/dev/null || true
          sudo tailscale funnel reset 2>/dev/null || true
          sleep 2
          # Open ports in iptables
          sudo iptables -I INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || true
          sudo iptables -I INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || true
          sudo netfilter-persistent save 2>/dev/null || sudo iptables-save | sudo tee /etc/iptables/rules.v4 2>/dev/null || true
          sudo apt-get install -y certbot python3-certbot-nginx 2>/dev/null || true
          # 1. Clean ALL old nginx site configs
          sudo rm -f /etc/nginx/sites-enabled/* 2>/dev/null || true
          sudo rm -f /etc/nginx/sites-available/sinkialabs 2>/dev/null || true
          # 2. Write fresh nginx config (HTTP only - certbot will add SSL)
          sudo tee /etc/nginx/sites-available/sinkialabs > /dev/null << 'NGINX'
          server {
              listen 80;
              server_name sinkialabs.com www.sinkialabs.com;
              root /var/www/sinkialabs;
              index index.html;
              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 30s;
                  proxy_read_timeout 120s;
              }
              location / {
                  try_files $uri $uri/ /index.html;
              }
              location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                  expires 1h;
                  add_header Cache-Control "public, immutable";
              }
          }
          NGINX
          # 3. Create symlink
          sudo ln -sf /etc/nginx/sites-available/sinkialabs /etc/nginx/sites-enabled/sinkialabs
          # 4. Test and reload nginx
          sudo nginx -t
          sudo systemctl reload nginx 2>/dev/null || sudo systemctl start nginx
          # 5. Run certbot to add SSL
          sudo certbot --nginx -d sinkialabs.com -d www.sinkialabs.com --non-interactive --agree-tos --email info@chickenpalace.es --redirect || echo "Certbot failed but continuing"
          # 6. Final check
          echo "Nginx status: $(sudo systemctl is-active nginx)"
          echo "Ports listening:"
          sudo ss -tlnp | grep -E ':80|:443' || true
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
